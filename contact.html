<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Grace & Olive Lens</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div id="header"></div>

</nav>



<section class="contact-header">

<h1>
Let's tell your story.
</h1>


<p>
I would love to hear about the season of life you are celebrating. Fill out the form below and I'll be in touch soon.
</p>

</section>



<section class="contact-form">


<form id="contact-form" action="https://formspree.io/f/mzdnzdry" method="POST">

<input
type="hidden"
name="_next"
value="https://photography-website-80z.pages.dev/thankyou.html">


<label>
Name
</label>

<input 
type="text" 
name="name"
placeholder="Your Name">



<label>
Email
</label>

<input 
type="email" 
name="email"
placeholder="Your email">



<label>
Phone Number
</label>

<input 
type="tel"
name="phone"
placeholder="Your phone number">



<label>
What type of session are you interested in?
</label>


<select name="session">

<option>Maternity</option>

<option>Newborn</option>

<option>Fresh 48</option>

<option>Milestone</option>

<option>Family</option>

<option>Branding</option>

</select>



<label>
Tell me about your story.
</label>


<textarea 
name="message"
rows="6"
placeholder="Tell me about your family, your vision, and what you are hoping to capture.">
</textarea>



<button id="submit-btn" type="submit">
    Send Inquiry
</button>


</form>


</section>



<div id="footer"></div>

<script src="js/script.js"></script>

<p>
© 2026 Grace & Olive Lens
</p>


</body>

</html>
